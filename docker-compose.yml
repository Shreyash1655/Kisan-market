version: '3.8'
services:
  db:
    image: postgres:16-alpine
    container_name: kisan-db
    environment:
      - POSTGRES_USER=kisan
      - POSTGRES_PASSWORD=kisan123
      - POSTGRES_DB=kisan_market
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: